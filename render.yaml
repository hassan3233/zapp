# Render Blueprint for the Zapp backend.
# In the Render dashboard: New + → Blueprint → pick your repo. If the repo root
# is the whole "zapp" project, set this service's Root Directory to "server".
services:
  - type: web
    name: zapp-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      # Random, strong JWT secret generated by Render.
      - key: ZAPP_JWT_SECRET
        generateValue: true
      # No SMS provider yet → return the OTP so the app shows it on-screen.
      - key: ZAPP_RETURN_OTP
        value: "1"
      # Pin Node 24 (needed for the built-in node:sqlite module).
      - key: NODE_VERSION
        value: "24.16.0"
